version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    restart: unless-stopped
    networks:
      - evobrain_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: evobrain
      POSTGRES_PASSWORD: evobrain123
      POSTGRES_DB: evobrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - evobrain_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evobrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://evobrain:evobrain123@postgres:5432/evobrain
      - LLM_HOST=http://ollama:11434
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - models_data:/app/storage/models
      - checkpoints_data:/app/storage/checkpoints
    restart: unless-stopped
    networks:
      - evobrain_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - evobrain_network

volumes:
  ollama_data:
  postgres_data:
  models_data:
  checkpoints_data:

networks:
  evobrain_network:
    driver: bridge
